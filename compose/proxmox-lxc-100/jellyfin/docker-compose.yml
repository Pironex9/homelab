services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Budapest
      - UMASK=002
      - JELLYFIN_PublishedServerUrl=http://192.168.0.110:8096
    network_mode: host
    volumes:
      - /srv/docker-data/jellyfin:/config
      - /srv/docker-data/jellyfin/cache:/cache
      - type: bind
        source: /mnt/storage/media/movies
        target: /media
      - type: bind
        source: /mnt/storage/media/tv
        target: /media2
        read_only: true
    devices:                        # <-- HOZZÁADÁS
      - /dev/dri:/dev/dri          # <-- HOZZÁADÁS
    group_add:                      # <-- HOZZÁADÁS
      - "993"                       # <-- HOZZÁADÁS (render group GID)
    restart: unless-stopped
    extra_hosts:
      - host.docker.internal:host-gateway
networks:
  arr_stack:
    external: true