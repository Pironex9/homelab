services:
  backend:
    image: ghcr.io/pouzor/homelable-backend:latest
    container_name: homelable-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - SQLITE_PATH=/app/data/homelab.db
      - CORS_ORIGINS=["http://192.168.0.110:3001","http://homelable.lan"]
      - SCANNER_RANGES=["192.168.0.0/24"]
      - STATUS_CHECKER_INTERVAL=60
    volumes:
      - /srv/docker-data/homelable:/app/data
    cap_add:
      - NET_RAW
    networks:
      - homelable
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    image: ghcr.io/pouzor/homelable-frontend:latest
    container_name: homelable-frontend
    restart: unless-stopped
    ports:
      - 3001:80
    depends_on:
      - backend
    networks:
      - homelable

  mcp:
    build:
      context: /opt/homelable/mcp
      dockerfile: Dockerfile.mcp
    container_name: homelable-mcp
    restart: unless-stopped
    ports:
      - 8001:8001
    env_file: .env
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - homelable

networks:
  homelable:
    driver: bridge
