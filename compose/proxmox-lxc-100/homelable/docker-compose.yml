services:
  homelable-backend:
    image: ghcr.io/pouzor/homelable-backend:latest
    container_name: homelable-backend
    restart: unless-stopped
    environment:
      - SQLITE_PATH=/app/data/homelab.db
      - CORS_ORIGINS=["http://192.168.0.110:3001","http://homelable.lan"]
      - SCANNER_RANGES=["192.168.0.0/24"]
      - STATUS_CHECKER_INTERVAL=60
      # Sensitive - set in Komodo Stack Environment:
      # SECRET_KEY=
      # AUTH_USERNAME=admin
      # AUTH_PASSWORD_HASH=
    volumes:
      - /srv/docker-data/homelable:/app/data
    cap_add:
      - NET_RAW
    networks:
      - homelable
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  homelable-frontend:
    image: ghcr.io/pouzor/homelable-frontend:latest
    container_name: homelable-frontend
    restart: unless-stopped
    ports:
      - 3001:80
    depends_on:
      - homelable-backend
    networks:
      - homelable

  homelable-mcp:
    build:
      context: /opt/homelable/mcp
      dockerfile: Dockerfile.mcp
    container_name: homelable-mcp
    restart: unless-stopped
    ports:
      - 8001:8001
    environment:
      - BACKEND_URL=http://homelable-backend:8000
      # Sensitive - set in Komodo Stack Environment:
      # MCP_API_KEY=
      # MCP_SERVICE_KEY=
    depends_on:
      - homelable-backend
    networks:
      - homelable

networks:
  homelable:
    driver: bridge
