services:
  sonarr:
    image: ghcr.io/hotio/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Budapest
      - UMASK=002
    volumes:
      - /srv/docker-data/sonarr:/config
      - /mnt/storage/media/tv/hun:/tv/hun
      - /mnt/storage/media/tv/eng:/tv/eng
      - /mnt/storage/media/downloads:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped
    networks:
      - arr_stack
networks:
  arr_stack:
    external: true
