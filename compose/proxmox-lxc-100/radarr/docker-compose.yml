services:
  radarr:
    image: ghcr.io/hotio/radarr:latest
    container_name: radarr
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Budapest
      - UMASK=002
    volumes:
      - /srv/docker-data/radarr:/config
      - /mnt/storage/media/movies/hun:/movies/hun
      - /mnt/storage/media/movies/eng:/movies/eng
      - /mnt/storage/media/downloads:/downloads
    ports:
      - 7878:7878
    restart: unless-stopped
networks:
  arr_stack:
    external: true
