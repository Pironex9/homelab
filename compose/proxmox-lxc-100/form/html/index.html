<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beleegyező nyilatkozat - Aláírás</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem;
      max-width: 480px;
      width: 100%;
    }

    .logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: #1a56db;
      border-radius: 14px;
      margin-bottom: 0.75rem;
    }

    .logo-icon svg { color: #fff; }

    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      color: #111827;
      text-align: center;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      text-align: center;
      color: #6b7280;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      padding: 0.6rem 0.85rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111827;
      transition: border-color 0.15s;
      outline: none;
    }

    input:focus {
      border-color: #1a56db;
      box-shadow: 0 0 0 3px rgba(26,86,219,0.12);
    }

    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }

    .checkbox-row input[type="checkbox"] {
      margin-top: 3px;
      width: 16px;
      height: 16px;
      accent-color: #1a56db;
      flex-shrink: 0;
      cursor: pointer;
    }

    .checkbox-row label {
      font-size: 0.875rem;
      color: #374151;
      margin: 0;
      cursor: pointer;
      line-height: 1.5;
    }

    .turnstile-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.75rem;
      background: #1a56db;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    button[type="submit"]:hover:not(:disabled) { background: #1648c4; }
    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }

    .status {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
      text-align: center;
    }

    .status.success { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; display: block; }
    .status.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; display: block; }

    /* Honeypot - hidden from real users */
    .hp-field { position: absolute; left: -9999px; top: -9999px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
    </div>
    <h1>Beleegyező nyilatkozat</h1>
    <p class="subtitle">Az aláírási linket e-mailben küldjük el Önnek.</p>
  </div>

  <form id="signForm">
    <!-- Honeypot field - invisible to real users -->
    <div class="hp-field" aria-hidden="true">
      <label for="website">Website</label>
      <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
    </div>

    <div class="field">
      <label for="name">Teljes név</label>
      <input type="text" id="name" name="name" placeholder="Pl. Kiss János" required>
    </div>

    <div class="field">
      <label for="email">E-mail cím</label>
      <input type="email" id="email" name="email" placeholder="Pl. kiss.janos@email.com" required>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="agree" name="agree" required>
      <label for="agree">
        Elolvastam és elfogadom a tájékoztatóban foglaltakat, és hozzájárulok az elektronikus aláíráshoz.
      </label>
    </div>

    <div class="turnstile-wrap">
      <div class="cf-turnstile" data-sitekey="TURNSTILE_SITE_KEY_HERE" data-theme="light"></div>
    </div>

    <button type="submit" id="submitBtn">Aláírási link küldése</button>
  </form>

  <div class="status" id="statusMsg"></div>
</div>

<script>
  const WEBHOOK_URL = 'https://n8n.homelabor.net/webhook/docuseal-form';
  const WEBHOOK_SECRET = 'WEBHOOK_SECRET_HERE';

  const form = document.getElementById('signForm');
  const submitBtn = document.getElementById('submitBtn');
  const statusMsg = document.getElementById('statusMsg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const agree = document.getElementById('agree').checked;
    const website = document.getElementById('website').value; // honeypot
    const turnstileToken = document.querySelector('[name="cf-turnstile-response"]')?.value;

    if (!turnstileToken) {
      showStatus('error', 'Kérem várjon, amíg a biztonsági ellenőrzés befejez.');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Küldés...';
    statusMsg.className = 'status';
    statusMsg.style.display = 'none';

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Form-Token': WEBHOOK_SECRET
        },
        body: JSON.stringify({ name, email, agree, website, turnstileToken })
      });

      if (res.ok) {
        form.style.display = 'none';
        showStatus('success', '✓ Köszönjük! Az aláírási linket elküldtük az e-mail címére.');
      } else {
        throw new Error('Server error');
      }
    } catch {
      showStatus('error', 'Hiba történt a küldés során. Kérjük próbálja újra.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Aláírási link küldése';
    }
  });

  function showStatus(type, msg) {
    statusMsg.className = 'status ' + type;
    statusMsg.textContent = msg;
  }
</script>
</body>
</html>
