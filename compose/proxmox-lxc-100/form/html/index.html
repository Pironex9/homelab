<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consent Form - E-Signature</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem;
      max-width: 480px;
      width: 100%;
    }

    .lang-toggle {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 1.25rem;
    }

    .lang-btn {
      background: none;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      padding: 0.3rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .lang-btn:hover { border-color: #1a56db; color: #1a56db; }

    .logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: #1a56db;
      border-radius: 14px;
      margin-bottom: 0.75rem;
    }

    .logo-icon svg { color: #fff; }

    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      color: #111827;
      text-align: center;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      text-align: center;
      color: #6b7280;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .field { margin-bottom: 1.25rem; }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      width: 100%;
      padding: 0.6rem 0.85rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111827;
      transition: border-color 0.15s;
      outline: none;
    }

    input:focus {
      border-color: #1a56db;
      box-shadow: 0 0 0 3px rgba(26,86,219,0.12);
    }

    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }

    .checkbox-row input[type="checkbox"] {
      margin-top: 3px;
      width: 16px;
      height: 16px;
      accent-color: #1a56db;
      flex-shrink: 0;
      cursor: pointer;
    }

    .checkbox-row label {
      font-size: 0.875rem;
      color: #374151;
      margin: 0;
      cursor: pointer;
      line-height: 1.5;
    }

    .turnstile-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.75rem;
      background: #1a56db;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    button[type="submit"]:hover:not(:disabled) { background: #1648c4; }
    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }

    .status {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
      text-align: center;
    }

    .status.success { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; display: block; }
    .status.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; display: block; }

    /* Honeypot - hidden from real users */
    .hp-field { position: absolute; left: -9999px; top: -9999px; }
  </style>
</head>
<body>
<div class="card">
  <div class="lang-toggle">
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">HU</button>
  </div>

  <div class="logo">
    <div class="logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
    </div>
    <h1 id="t-title">Consent Form</h1>
    <p class="subtitle" id="t-subtitle">We will send the signing link to your email address.</p>
  </div>

  <form id="signForm">
    <!-- Honeypot field - invisible to real users -->
    <div class="hp-field" aria-hidden="true">
      <label for="website">Website</label>
      <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
    </div>

    <div class="field">
      <label for="name" id="t-name-label">Full name</label>
      <input type="text" id="name" name="name" placeholder="e.g. John Smith" required>
    </div>

    <div class="field">
      <label for="email" id="t-email-label">Email address</label>
      <input type="email" id="email" name="email" placeholder="e.g. john.smith@email.com" required>
    </div>

    <div class="field">
      <label for="phone" id="t-phone-label">Phone number</label>
      <input type="tel" id="phone" name="phone" placeholder="e.g. +36 20 123 4567" required>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="agree" name="agree" required>
      <label for="agree" id="t-agree-label">
        I have read and accept the terms of the disclosure and consent to the electronic signature.
      </label>
    </div>

    <div class="turnstile-wrap">
      <div class="cf-turnstile" data-sitekey="0x4AAAAAACrP3i0_9HpJincP" data-theme="light"></div>
    </div>

    <button type="submit" id="submitBtn">Send signing link</button>
  </form>

  <div class="status" id="statusMsg"></div>
</div>

<script>
  const WEBHOOK_URL = '/api/submit';

  const translations = {
    en: {
      title: 'Consent Form',
      subtitle: 'We will send the signing link to your email address.',
      nameLabel: 'Full name',
      namePlaceholder: 'e.g. John Smith',
      emailLabel: 'Email address',
      emailPlaceholder: 'e.g. john.smith@email.com',
      phoneLabel: 'Phone number',
      phonePlaceholder: 'e.g. +44 20 1234 5678',
      agreeLabel: 'I have read and accept the terms of the disclosure and consent to the electronic signature.',
      submitBtn: 'Send signing link',
      submitting: 'Sending...',
      successMsg: '✓ Thank you! The signing link has been sent to your email address.',
      errorMsg: 'An error occurred. Please try again.',
      turnstileWait: 'Please wait for the security check to complete.',
      langSwitch: 'HU',
      htmlLang: 'en'
    },
    hu: {
      title: 'Beleegyező nyilatkozat',
      subtitle: 'Az aláírási linket e-mailben küldjük el Önnek.',
      nameLabel: 'Teljes név',
      namePlaceholder: 'Pl. Kiss János',
      emailLabel: 'E-mail cím',
      emailPlaceholder: 'Pl. kiss.janos@email.com',
      phoneLabel: 'Telefonszám',
      phonePlaceholder: 'Pl. +36 20 123 4567',
      agreeLabel: 'Elolvastam és elfogadom a tájékoztatóban foglaltakat, és hozzájárulok az elektronikus aláíráshoz.',
      submitBtn: 'Aláírási link küldése',
      submitting: 'Küldés...',
      successMsg: '✓ Köszönjük! Az aláírási linket elküldtük az e-mail címére.',
      errorMsg: 'Hiba történt a küldés során. Kérjük próbálja újra.',
      turnstileWait: 'Kérem várjon, amíg a biztonsági ellenőrzés befejez.',
      langSwitch: 'EN',
      htmlLang: 'hu'
    }
  };

  let lang = 'en';

  function applyLang() {
    const t = translations[lang];
    document.documentElement.lang = t.htmlLang;
    document.getElementById('t-title').textContent = t.title;
    document.getElementById('t-subtitle').textContent = t.subtitle;
    document.getElementById('t-name-label').textContent = t.nameLabel;
    document.getElementById('name').placeholder = t.namePlaceholder;
    document.getElementById('t-email-label').textContent = t.emailLabel;
    document.getElementById('email').placeholder = t.emailPlaceholder;
    document.getElementById('t-phone-label').textContent = t.phoneLabel;
    document.getElementById('phone').placeholder = t.phonePlaceholder;
    document.getElementById('t-agree-label').textContent = t.agreeLabel;
    document.getElementById('submitBtn').textContent = t.submitBtn;
    document.getElementById('langBtn').textContent = t.langSwitch;
  }

  function toggleLang() {
    lang = lang === 'en' ? 'hu' : 'en';
    applyLang();
  }

  const form = document.getElementById('signForm');
  const submitBtn = document.getElementById('submitBtn');
  const statusMsg = document.getElementById('statusMsg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const t = translations[lang];

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const agree = document.getElementById('agree').checked;
    const website = document.getElementById('website').value;
    const turnstileToken = document.querySelector('[name="cf-turnstile-response"]')?.value;

    if (!turnstileToken) {
      showStatus('error', t.turnstileWait);
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = t.submitting;
    statusMsg.className = 'status';
    statusMsg.style.display = 'none';

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ name, email, phone, agree, website, turnstileToken })
      });

      if (res.ok) {
        form.style.display = 'none';
        showStatus('success', t.successMsg);
      } else {
        throw new Error('Server error');
      }
    } catch {
      showStatus('error', t.errorMsg);
      submitBtn.disabled = false;
      submitBtn.textContent = t.submitBtn;
    }
  });

  function showStatus(type, msg) {
    statusMsg.className = 'status ' + type;
    statusMsg.textContent = msg;
  }
</script>
</body>
</html>
