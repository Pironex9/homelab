services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: minecraft
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      MEMORY: 4G
      TZ: Europe/Budapest
      # Auto-install GeyserMC + Floodgate on every start
      PLUGINS: |
        https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot
        https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot
      # Server settings
      MOTD: "Homelab Minecraft"
      MAX_PLAYERS: "10"
      DIFFICULTY: normal
      # Optional whitelist - uncomment to restrict to specific players:
      # WHITELIST: "Player1,Player2"
      # ENFORCE_WHITELIST: "TRUE"
    ports:
      - "25565:25565"       # Java Edition (TCP)
      - "19132:19132/udp"   # Bedrock Edition via GeyserMC (UDP)
      - "8100:8100"         # BlueMap web interface (LAN only)
    volumes:
      - /opt/minecraft/data:/data
    restart: unless-stopped
